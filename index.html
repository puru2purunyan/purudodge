
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぷるにゃん ドキドキ！よけよけゲーム</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(180deg,#c4e4ff 0%,#e4f4ff 60%,#cce8ff 100%);
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    font-family: 'Hiragino Maru Gothic Pro','BIZ UDPGothic',sans-serif;
    overflow: hidden; touch-action: none;
  }
  #overlay {
    position: fixed; inset:0; z-index:50;
    display: flex; flex-direction:column; align-items:center; justify-content:center;
    background: linear-gradient(180deg,#b8dfff 0%,#ddf0ff 100%);
    gap:16px; padding:30px;
  }
  #overlay h1 { font-size:1.5rem; color:#2a68b8; letter-spacing:2px; text-align:center; text-shadow:0 2px 8px #aad8ff; }
  #overlay p  { color:#4488bb; font-size:.9rem; text-align:center; line-height:1.9; }
  .mascots { display:flex; gap:4px; align-items:flex-end; }
  .mascots img { width:90px; image-rendering:auto; filter:drop-shadow(0 4px 12px #88ccff88); }
  .btn-main {
    background:linear-gradient(135deg,#6ab8f7,#4090d8);
    color:#fff; border:none; border-radius:50px;
    padding:13px 40px; font-size:1.1rem; font-family:inherit;
    cursor:pointer; box-shadow:0 4px 16px #80c8ff66; letter-spacing:2px;
  }
  .btn-main:active { transform:scale(.96); }
  .share-btn {
    background:#1d9bf0; color:#fff; border:none; border-radius:50px;
    padding:11px 30px; font-size:.95rem; font-family:inherit; cursor:pointer;
  }
  #hud {
    width:100%; max-width:400px;
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 18px 4px;
  }
  #score-label { font-size:.72rem; color:#70a8d8; display:block; }
  #score-val   { font-size:1.45rem; color:#1a5aaa; font-weight:bold; }
  #level-disp  { font-size:.8rem; color:#70a8d8; }
  #canvas-wrap { flex:1; width:100%; max-width:400px; position:relative; overflow:hidden; }
  canvas { width:100%; height:100%; display:block; }
  #controls {
    width:100%; max-width:400px;
    padding:10px 18px 20px; display:flex; gap:16px;
  }
  .ctrl-btn {
    flex:1; height:68px;
    background:linear-gradient(135deg,#a8d8f8cc,#6ab8f7cc);
    border:2px solid #90c8ffaa; border-radius:18px;
    font-size:2rem; color:#fff; cursor:pointer;
    box-shadow:0 4px 14px #88ccff44, inset 0 1px 0 #ffffffaa;
    display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none; touch-action:none;
    transition:transform .08s;
  }
  .ctrl-btn.pressed { transform:scale(.92); background:linear-gradient(135deg,#70b0f8cc,#3880e0cc); }
  #score-final { font-size:2.6rem; color:#1a5aaa; font-weight:bold; }
  #score-best  { font-size:.9rem; color:#80b8d8; }
</style>
</head>

let score=0, bestScore=0, frame=0, gameRunning=false;
let playerLane=1, enemies=[], particles=[];
let baseSpeed=3, spawnInterval=80, lastScore=0;

function getLaneX(lane){ const lw=canvas.width/3; return lw*lane+lw/2; }

// 攻略不可パターン防止: 最大2レーンまでブロック、常に1レーン以上空き
function spawnWave(){
  const speed = baseSpeed;
  const maxBlock = (score > 2000 && Math.random() < 0.35) ? 2 : 1;
  const lanes = [0,1,2];
  for(let i=2;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [lanes[i],lanes[j]]=[lanes[j],lanes[i]]; }
  for(const lane of lanes.slice(0, maxBlock)){
    enemies.push({ lane, y:-55, speed });
  }
}

function spawnParticles(x,y){
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:4+Math.random()*5,life:1,
      color:`hsl(${195+Math.random()*30},${70+Math.random()*20}%,${65+Math.random()*20}%)`});
  }
}

function update(){
  if(!gameRunning) return;
  frame++; score++;
  const lv = Math.floor(score/400)+1;
  baseSpeed    = 2.8 + lv*0.45;
  spawnInterval = Math.max(32, 88-lv*5);
  document.getElementById('level-disp').textContent = `レベル ${lv}`;

  if(frame % Math.floor(spawnInterval) === 0) spawnWave();

  const playerY = canvas.height - 110;
  for(const e of enemies) e.y += e.speed;

  for(const e of enemies){
    if(e.lane===playerLane && e.y+44>=playerY-40 && e.y-44<=playerY+0){
      spawnParticles(getLaneX(playerLane), playerY);
      gameRunning = false;
      setTimeout(showGameOver, 700);
      return;
    }
  }

  enemies = enemies.filter(e => e.y < canvas.height+70);

  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.028;
  }
  particles = particles.filter(p => p.life>0);

  document.getElementById('score-val').textContent = Math.floor(score/10);
}

function draw(){
  const w=canvas.width, h=canvas.height, lw=w/3;
  ctx.clearRect(0,0,w,h);

  // 背景グラデーション
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#c0e2ff'); g.addColorStop(1,'#e8f6ff');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

  // 浮かぶバブル（装飾）
  for(let i=0;i<4;i++){
    const by=((frame*0.28+i*110)%(h+80))-40;
    const bx=[w*.12,w*.45,w*.72,w*.88][i];
    ctx.beginPath(); ctx.arc(bx,by,10+i*5,0,Math.PI*2);
    ctx.strokeStyle='#a0d0f033'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // レーン区切り
  ctx.setLineDash([14,10]); ctx.strokeStyle='#90c0ee44'; ctx.lineWidth=2;
  for(let i=1;i<3;i++){
    ctx.beginPath(); ctx.moveTo(lw*i,0); ctx.lineTo(lw*i,h); ctx.stroke();
  }
  ctx.setLineDash([]);

  const charSize = lw * 0.88;

  // アワワン（敵）
  for(const e of enemies){
    ctx.drawImage(awaImg, getLaneX(e.lane)-charSize/2, e.y-charSize/2, charSize, charSize);
  }

  // ぷるにゃん（プレイヤー）ふわふわボブ
  if(gameRunning){
    const px=getLaneX(playerLane);
    const py=canvas.height-110;
    const bob=Math.sin(frame*0.1)*3;
    ctx.drawImage(puruImg, px-charSize/2, py-charSize/2+bob, charSize, charSize);
  }

  // パーティクル
  for(const p of particles){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

function moveLeft() { if(playerLane>0 && gameRunning) playerLane--; }
function moveRight(){ if(playerLane<2 && gameRunning) playerLane++; }

function setupBtn(id, action){
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart',e=>{e.preventDefault();btn.classList.add('pressed');action();},{passive:false});
  btn.addEventListener('touchend',  e=>{e.preventDefault();btn.classList.remove('pressed');},{passive:false});
  btn.addEventListener('mousedown', ()=>{btn.classList.add('pressed');action();});
  btn.addEventListener('mouseup',   ()=>btn.classList.remove('pressed'));
}
setupBtn('btn-left',  moveLeft);
setupBtn('btn-right', moveRight);
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft')  moveLeft();
  if(e.key==='ArrowRight') moveRight();
});

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0; frame=0; playerLane=1; enemies=[]; particles=[];
  baseSpeed=2.8; spawnInterval=88; gameRunning=true;
  document.getElementById('score-val').textContent='0';
  document.getElementById('level-disp').textContent='レベル 1';
}

function showGameOver(){
  const s=Math.floor(score/10);
  if(s>bestScore) bestScore=s;
  lastScore=s;
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ol-title').textContent='ぶつかっちゃった！😿';
  document.getElementById('ol-body').style.display='none';
  document.getElementById('score-final').style.display='block';
  document.getElementById('score-final').textContent=s+'点';
  document.getElementById('score-best').style.display='block';
  document.getElementById('score-best').textContent='ベスト: '+bestScore+'点';
  document.getElementById('ol-start-btn').textContent='もういちど！';
  document.getElementById('ol-share-btn').style.display='block';
}

function shareScore(){
  const text=`ぷるにゃんドキドキよけよけゲームで${lastScore}点とったよ！🐱💙 アワワンから逃げ切れるかな？ #ぷるにゃん #アワワン`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,'_blank');
}
</script>
